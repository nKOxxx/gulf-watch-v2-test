<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulf Watch v2 Test - Government Sources</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 20px; }
        .incident {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #e74c3c;
        }
        .incident.gov { border-left-color: #f39c12; }
        .title { font-weight: 600; margin-bottom: 5px; }
        .meta { font-size: 13px; color: #888; }
        .meta span { margin-right: 15px; }
        .loading { color: #888; padding: 40px; text-align: center; }
        .error { color: #e74c3c; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <h1>🛡️ Gulf Watch v2 Test</h1>
    <div class="subtitle">Direct Government RSS Feeds (No Nitter)</div>
    <div id="status"></div>
    <div id="incidents"></div>

    <script>
        async function load() {
            const container = document.getElementById('incidents');
            const status = document.getElementById('status');
            
            try {
                const response = await fetch('incidents.json?_=' + Date.now());
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const data = await response.json();
                status.innerHTML = `<div style="margin-bottom: 20px; color: #27ae60;">
                    ✅ ${data.total_incidents} incidents | Generated: ${new Date(data.generated_at).toLocaleString()}
                </div>`;
                
                container.innerHTML = data.incidents.map(inc => `
                    <div class="incident gov">
                        <div class="title">${inc.title}</div>
                        <div class="meta">
                            <span>🏛️ ${inc.source}</span>
                            <span>📍 ${inc.location.name}, ${inc.location.country}</span>
                            <span>⏰ ${new Date(inc.published).toLocaleString()}</span>
                            <span>🔖 ${inc.type}</span>
                        </div>
                        ${inc.source_url ? `<div style="margin-top: 8px;"><a href="${inc.source_url}" target="_blank" style="color: #3498db;">View Source →</a></div>` : ''}
                    </div>
                `).join('');
                
            } catch (e) {
                container.innerHTML = `<div class="error">Error: ${e.message}</div>`;
            }
        }
        
        load();
    </script>
</body>
</html>
